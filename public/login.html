<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Farewell Seat System</title>
  <meta name="description" content="Login with your student details to reserve your farewell seat." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div id="toast-container"></div>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">🎓</div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Enter your student details to access the seat reservation</p>

    <!-- Single-Step Login Form -->
    <div class="auth-step active" id="step-register">

      <div class="form-group">
        <label class="form-label" for="inp-name">Full Name</label>
        <input class="form-input" id="inp-name" type="text" placeholder="e.g. Ali Khan" autocomplete="name" />
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-email">Student Email</label>
        <input class="form-input" id="inp-email" type="email" placeholder="ali@university.edu" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-roll">Roll Number</label>
        <input class="form-input" id="inp-roll" type="text" placeholder="e.g. CS-2021-001" autocomplete="off" />
      </div>

      <button class="btn btn-primary btn-full" id="btn-login">
        <span id="login-btn-text">Login →</span>
        <span id="login-spinner" class="spinner" style="display:none"></span>
      </button>

      <p class="auth-footer">
        This device will be permanently linked to your account.<br />
        <strong>One account — one device only.</strong>
      </p>

    </div>

  </div>
</div>

<script src="/js/utils.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
